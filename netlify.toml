# Netlify-Konfiguration für MailPilot (Next.js)

[build]
  # Next.js-Build; @netlify/plugin-nextjs übernimmt Serving + SSR/Functions.
  command = "next build"
  publish = ".next"
  # Eigene Serverless-Funktionen (Claude-KI, Stripe, Geräte-Limits).
  functions = "netlify/functions"

[build.environment]
  # Node 22: bringt natives WebSocket mit (supabase-js braucht das ab v2.1xx,
  # sonst wirft der Client-Init auf Node 20 "without native WebSocket support").
  NODE_VERSION = "22"

# Offizielles Next.js-Plugin (wird von Netlify i. d. R. automatisch erkannt;
# hier explizit, damit der Build deterministisch ist).
[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"

# Sicherheits-Header für alle Seiten.
# Bewusst KEIN X-Frame-Options/frame-ancestors: das Outlook-Add-in
# (outlook/taskpane.html) muss in Outlook eingebettet werden dürfen.
# Mikrofon bleibt für die eigene Origin erlaubt (Spracheingabe „Sprechen").
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), geolocation=(), microphone=(self)"
