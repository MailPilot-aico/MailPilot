<!--
  Netlify Forms + Next.js (@netlify/plugin-nextjs v5):
  Diese statische Datei deklariert das Formular, damit Netlify es beim Deploy
  erkennt. Das echte Formular (in der App) hat KEIN data-netlify mehr und
  postet per JS an /__forms.html. Siehe https://opennext.js.org/netlify/forms
-->
<html>
  <head></head>
  <body>
    <form name="enterprise-inquiry" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="enterprise-inquiry" />
      <input name="bot-field" />
      <input name="email" type="email" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
