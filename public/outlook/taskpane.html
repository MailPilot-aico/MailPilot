<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MailPilot</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    :root { --bg:#0a0710; --soft:#120c1d; --bd:#2c2148; --tx:#f3f0fa; --mut:#a99fc0; --faint:#6e6388; --acc:#8b5cf6; --ok:#34d399; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system, Segoe UI, Roboto, sans-serif; background:var(--bg); color:var(--tx); font-size:14px; }
    .wrap { padding:14px; display:flex; flex-direction:column; gap:10px; }
    .top { display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .brand { font-weight:700; font-size:16px; }
    .auth { display:flex; align-items:center; gap:8px; font-size:12px; }
    .dot { width:8px; height:8px; border-radius:50%; background:var(--mut); }
    .dot.on { background:var(--ok); }
    label { font-size:12px; color:var(--mut); }
    textarea, select { width:100%; background:var(--soft); color:var(--tx); border:1px solid var(--bd); border-radius:10px; padding:10px 12px; font:inherit; font-size:14px; resize:vertical; }
    textarea:focus, select:focus { outline:none; border-color:var(--acc); }
    #notes { min-height:104px; } #out { min-height:150px; }
    button { border:none; border-radius:10px; padding:11px 14px; font:inherit; font-weight:600; cursor:pointer; }
    .primary { background:var(--acc); color:#fff; }
    .ghost { background:transparent; color:var(--tx); border:1px solid var(--bd); }
    .sm { padding:6px 11px; font-size:12px; }
    button:disabled { opacity:.5; cursor:default; }
    .row { display:flex; align-items:center; gap:8px; }
    .chips { display:flex; gap:6px; flex-wrap:wrap; }
    .chip { border:1px solid var(--bd); background:transparent; color:var(--mut); border-radius:999px; padding:4px 11px; font-size:12px; cursor:pointer; }
    .chip:hover { border-color:var(--acc); color:var(--tx); }
    .mic { display:inline-flex; align-items:center; justify-content:center; width:38px; height:38px; flex:none; border:1px solid var(--bd); background:transparent; color:var(--mut); border-radius:10px; cursor:pointer; }
    .mic:hover { border-color:var(--acc); color:var(--tx); }
    .mic.rec { color:#ff6b6b; border-color:#ff6b6b; }
    .slider { display:flex; align-items:center; gap:10px; }
    .slider input[type=range] { flex:1; accent-color:var(--acc); }
    .slider .val { font-size:12px; color:var(--tx); min-width:74px; text-align:right; }
    .status { font-size:12px; color:var(--mut); min-height:16px; }
    .hint { font-size:11px; color:var(--faint); line-height:1.5; }
    a { color:var(--acc); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <span class="brand">MailPilot</span>
      <span class="auth"><span class="dot" id="authDot"></span><span id="authText">Nicht angemeldet</span>
        <button id="login" class="ghost sm" type="button">Anmelden</button>
      </span>
    </div>

    <div class="chips" id="tpls">
      <button class="chip" type="button" data-b="Angebot für [Produkt/Leistung]&#10;Preis: [X] €&#10;Lieferzeit: [X] Tage&#10;gültig bis [Datum]">Angebot</button>
      <button class="chip" type="button" data-b="Terminvorschlag für [Anlass]&#10;Datum: [Datum] um [Uhrzeit]&#10;bitte um kurze Bestätigung">Termin</button>
      <button class="chip" type="button" data-b="Leider Absage zu [Anfrage]&#10;Grund: [kurz]&#10;Dank für das Interesse">Absage</button>
      <button class="chip" type="button" data-b="freundlich nachfassen zu [Thema/Angebot vom Datum]&#10;sind noch Fragen offen?&#10;bitte um Rückmeldung">Nachfassen</button>
    </div>

    <label for="notes">Stichpunkte (tippen oder 🎤 reinsprechen)</label>
    <div class="row">
      <textarea id="notes" placeholder="Schreib oder sprich einfach, was rein soll …"></textarea>
      <button class="mic" id="mic" type="button" title="Reinsprechen" aria-label="Reinsprechen">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 11a7 7 0 0 1-14 0"/><line x1="12" y1="18" x2="12" y2="22"/></svg>
      </button>
    </div>

    <label for="tone">Tonfall</label>
    <select id="tone">
      <option value="professionell">Professionell</option>
      <option value="freundlich">Freundlich</option>
      <option value="foermlich">Förmlich</option>
      <option value="locker">Locker</option>
    </select>

    <label>Länge</label>
    <div class="slider"><input type="range" id="len" min="0" max="100" step="1" value="50" /><span class="val" id="lenVal">mittel</span></div>
    <label>Förmlichkeit</label>
    <div class="slider"><input type="range" id="form" min="0" max="100" step="1" value="50" /><span class="val" id="formVal">neutral</span></div>

    <button id="gen" class="primary" type="button">E-Mail erzeugen</button>
    <div class="status" id="status"></div>

    <label for="out">Ergebnis</label>
    <textarea id="out" readonly placeholder="Die fertige E-Mail erscheint hier …"></textarea>
    <button id="insert" class="ghost" type="button" disabled>In die E-Mail einfügen</button>

    <div class="hint">
      „Anmelden" verbindet dein MailPilot-Konto → echte KI (korrigiert Tipp-/Sprachfehler
      automatisch). Ohne Login Demo-Modus. Konto: <a href="https://mailpilot-ai.com" target="_blank" rel="noreferrer">mailpilot-ai.com</a>.
    </div>
  </div>

  <script>
    var ready = false, authToken = null, recog = null, listening = false;
    if (window.Office) { Office.onReady(function () { ready = true; }); }
    function $(id) { return document.getElementById(id); }
    function setStatus(m) { $('status').textContent = m || ''; }
    function setLoggedIn(on) {
      $('authDot').className = 'dot' + (on ? ' on' : '');
      $('authText').textContent = on ? 'Angemeldet' : 'Nicht angemeldet';
      $('login').textContent = on ? 'Abmelden' : 'Anmelden';
    }
    var LEN = ['sehr kurz','kurz','mittel','lang','sehr lang'];
    var FORM = ['locker','eher locker','neutral','eher förmlich','förmlich'];
    function bucket(v) { return Math.round(v / 25); }

    function login() {
      if (authToken) { authToken = null; setLoggedIn(false); setStatus('Abgemeldet.'); return; }
      if (!ready || !Office.context || !Office.context.ui) { setStatus('Login nur im Outlook-Schreibfenster möglich.'); return; }
      Office.context.ui.displayDialogAsync('https://mailpilot-ai.com/outlook/auth', { height: 62, width: 34, promptBeforeOpen: false }, function (res) {
        if (res.status !== Office.AsyncResultStatus.Succeeded) { setStatus('Login-Fenster konnte nicht geöffnet werden.'); return; }
        var dialog = res.value;
        dialog.addEventHandler(Office.EventType.DialogMessageReceived, function (arg) {
          try { var data = JSON.parse(arg.message); if (data && data.token) { authToken = data.token; setLoggedIn(true); setStatus('Angemeldet – echte KI aktiv.'); } } catch (e) {}
          dialog.close();
        });
      });
    }

    // Reinsprechen (Web Speech API – in Edge/WebView vorhanden).
    function toggleMic() {
      var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { setStatus('Spracheingabe wird hier nicht unterstützt.'); return; }
      if (listening) { try { recog && recog.stop(); } catch (e) {} return; }
      recog = new SR();
      recog.lang = 'de-DE'; recog.interimResults = false; recog.continuous = true;
      recog.onresult = function (e) {
        var t = '';
        for (var i = e.resultIndex; i < e.results.length; i++) { if (e.results[i].isFinal) t += e.results[i][0].transcript; }
        t = t.trim();
        if (t) { var n = $('notes'); n.value += (n.value && !/\s$/.test(n.value) ? ' ' : '') + t; }
      };
      recog.onerror = function () { listening = false; $('mic').className = 'mic'; };
      recog.onend = function () { listening = false; $('mic').className = 'mic'; };
      try { recog.start(); listening = true; $('mic').className = 'mic rec'; $('notes').focus(); } catch (e) { listening = false; }
    }

    function demo(text, tone) {
      var greet = { professionell:'Sehr geehrte Damen und Herren,', freundlich:'Hallo zusammen,', foermlich:'Sehr geehrte Damen und Herren,', locker:'Hi,' }[tone] || 'Sehr geehrte Damen und Herren,';
      var close = { professionell:'Mit freundlichen Grüßen', freundlich:'Viele Grüße', foermlich:'Hochachtungsvoll', locker:'Beste Grüße' }[tone] || 'Mit freundlichen Grüßen';
      var lines = text.split('\n').map(function (l) { l = l.trim(); if (!l) return ''; l = l.charAt(0).toUpperCase() + l.slice(1); if (!/[.!?:]$/.test(l)) l += '.'; return l; });
      return greet + '\n\n' + lines.join('\n').trim() + '\n\n' + close + '\n[Name]';
    }

    async function generate() {
      var text = $('notes').value.trim();
      if (!text) { setStatus('Bitte zuerst Stichpunkte eingeben oder reinsprechen.'); return; }
      $('gen').disabled = true; setStatus('Wird erzeugt …');
      var email = '';
      try {
        var headers = { 'Content-Type': 'application/json' };
        if (authToken) headers['Authorization'] = 'Bearer ' + authToken;
        var res = await fetch('https://mailpilot-ai.com/.netlify/functions/optimize-email', {
          method: 'POST', headers: headers,
          body: JSON.stringify({ text: text, tone: $('tone').value, length: +$('len').value, formality: +$('form').value })
        });
        if (res.ok) { var d = await res.json(); email = d.email || ''; setStatus('Fertig.'); }
        else if (res.status === 401) { authToken = null; setLoggedIn(false); $('gen').disabled = false; setStatus('Sitzung abgelaufen – bitte oben erneut „Anmelden".'); return; }
        else if (res.status === 429) { $('gen').disabled = false; setStatus('Tageslimit erreicht (5 gratis pro Tag). Morgen wieder – oder Tarif upgraden.'); return; }
        else { email = demo(text, $('tone').value); setStatus('Demo-Modus.'); }
      } catch (e) { email = demo(text, $('tone').value); setStatus('Offline — Demo-Modus.'); }
      $('out').value = email; $('insert').disabled = !email; $('gen').disabled = false;
    }

    // Reinen Text in HTML wandeln, damit Outlook (HTML-Mail) die Zeilenumbrüche/Absätze
    // behält – sonst wird alles in einen Block geschrieben.
    function textToHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\r\n|\r|\n/g, '<br>');
    }
    function insertIntoMail() {
      if (!ready || !Office.context || !Office.context.mailbox) { setStatus('Das Einfügen funktioniert nur im Outlook-Schreibfenster.'); return; }
      Office.context.mailbox.item.body.setSelectedDataAsync(textToHtml($('out').value), { coercionType: Office.CoercionType.Html },
        function (r) { setStatus(r.status === Office.AsyncResultStatus.Succeeded ? 'In die E-Mail eingefügt ✓' : 'Einfügen fehlgeschlagen.'); });
    }

    document.addEventListener('DOMContentLoaded', function () {
      $('login').addEventListener('click', login);
      $('mic').addEventListener('click', toggleMic);
      $('gen').addEventListener('click', generate);
      $('insert').addEventListener('click', insertIntoMail);
      $('len').addEventListener('input', function () { $('lenVal').textContent = LEN[bucket(+this.value)]; });
      $('form').addEventListener('input', function () { $('formVal').textContent = FORM[bucket(+this.value)]; });
      Array.prototype.forEach.call(document.querySelectorAll('#tpls .chip'), function (c) {
        c.addEventListener('click', function () { $('notes').value = c.getAttribute('data-b'); $('notes').focus(); });
      });
    });
  </script>
</body>
</html>
