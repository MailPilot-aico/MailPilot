<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="MailPilot">
  <defs>
    <!-- Hintergrund-Verlauf: identisch zum Header (linear-gradient 140deg, #8b5cf6 → #a855f7 55% → #7c3aed) -->
    <linearGradient id="mp-bg" x1="0.1785" y1="0.117" x2="0.8215" y2="0.883">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="0.55" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <!-- oberer Glanz (entspricht dem inset-Highlight des Headers) -->
    <linearGradient id="mp-sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.42" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- weicher Schatten unter dem Papierflieger -->
    <filter id="mp-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="18" stdDev="15" flood-color="#280846" flood-opacity="0.38"/>
    </filter>
  </defs>

  <!-- abgerundetes Quadrat mit Verlauf -->
  <rect x="0" y="0" width="512" height="512" rx="156" ry="156" fill="url(#mp-bg)"/>
  <!-- oberer Glanz -->
  <rect x="0" y="0" width="512" height="512" rx="156" ry="156" fill="url(#mp-sheen)"/>
  <!-- feiner Innenrahmen für Tiefe -->
  <rect x="6" y="6" width="500" height="500" rx="150" ry="150" fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="8"/>

  <!-- Papierflieger-Marke (Pfade identisch zum Header, zentriert & skaliert) -->
  <g transform="translate(105.74 105.74) scale(9.391)" filter="url(#mp-shadow)">
    <!-- Bewegungs-Spur -->
    <path d="M5.4 15.2C3.4 17 2.5 19.2 2.8 21.4" fill="none" stroke="#ffffff" stroke-opacity="0.32" stroke-width="1.7" stroke-linecap="round"/>
    <path d="M9.3 18.4C7.6 20.1 6.9 22 7.1 24" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.7" stroke-linecap="round"/>
    <!-- oberer Flügel -->
    <path d="M27.6 4.7 5.1 13.9l9.9 2.3z" fill="#ffffff"/>
    <!-- unterer Kiel (gefaltet) -->
    <path d="M27.6 4.7 15 16.2l-1 11z" fill="#ffffff" fill-opacity="0.7"/>
  </g>
</svg>
